name: DigitOracle
options:
  bundleIdPrefix: com.digitoracle
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "NCGL2D534N"

targets:
  DigitOracle:
    type: application
    platform: iOS
    sources:
      - path: DigitOracle
      - path: DigitOracleIntents
    entitlements:
      path: DigitOracle/DigitOracle.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.digitoracle.app
    settings:
      base:
        INFOPLIST_FILE: DigitOracle/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.digitoracle.app
        MARKETING_VERSION: "0.47.0"
        CURRENT_PROJECT_VERSION: "16"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: DigitOracle/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Digit Oracle
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - Cinzel.ttf
        UILaunchScreen: {}
        NSCameraUsageDescription: "Digit Oracle needs camera access to divine number visions"
        NSPhotoLibraryUsageDescription: "Digit Oracle needs photo library access to peer into thy visions"
        NSPhotoLibraryAddUsageDescription: "Digit Oracle saves captured visions to your library so originals are preserved without duplicating storage"
        NSLocationWhenInUseUsageDescription: "Digit Oracle uses your location to divine where you encountered a number"
    dependencies:
      - target: DigitOracleWidget
        embed: true
      - target: DigitOracleShareExtension
        embed: true

  DigitOracleWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: DigitOracleWidget
    entitlements:
      path: DigitOracleWidget/DigitOracleWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.digitoracle.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitoracle.app.widget
        MARKETING_VERSION: "0.47.0"
        CURRENT_PROJECT_VERSION: "16"
        INFOPLIST_FILE: DigitOracleWidget/Info.plist
    info:
      path: DigitOracleWidget/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Digit Oracle Widgets
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  DigitOracleShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: DigitOracleShareExtension
      - path: DigitOracle/Services/PendingSightingService.swift
      - path: DigitOracle/Utilities/Constants.swift
    entitlements:
      path: DigitOracleShareExtension/DigitOracleShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.digitoracle.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitoracle.app.share
        MARKETING_VERSION: "0.47.0"
        CURRENT_PROJECT_VERSION: "16"
        INFOPLIST_FILE: DigitOracleShareExtension/Info.plist
    info:
      path: DigitOracleShareExtension/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Digit Oracle
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
