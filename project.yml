name: BinaryCurious
options:
  bundleIdPrefix: com.binarycurious
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "NCGL2D534N"

targets:
  BinaryCurious:
    type: application
    platform: iOS
    sources:
      - path: BinaryCurious
      - path: BinaryCuriousIntents
    entitlements:
      path: BinaryCurious/BinaryCurious.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.binarycurious.app
    settings:
      base:
        INFOPLIST_FILE: BinaryCurious/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.binarycurious.app
        MARKETING_VERSION: "0.47.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: BinaryCurious/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Binary Curious
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        NSCameraUsageDescription: "Binary Curious needs camera access to capture number sightings"
        NSPhotoLibraryUsageDescription: "Binary Curious needs photo library access to import number sightings"
        NSLocationWhenInUseUsageDescription: "Binary Curious uses your location to tag where you spotted a number"
    dependencies:
      - target: BinaryCuriousWidget
        embed: true
      - target: BinaryCuriousShareExtension
        embed: true

  BinaryCuriousWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: BinaryCuriousWidget
    entitlements:
      path: BinaryCuriousWidget/BinaryCuriousWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.binarycurious.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.binarycurious.app.widget
        MARKETING_VERSION: "0.47.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: BinaryCuriousWidget/Info.plist
    info:
      path: BinaryCuriousWidget/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Binary Curious Widgets
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  BinaryCuriousShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BinaryCuriousShareExtension
      - path: BinaryCurious/Services/PendingSightingService.swift
      - path: BinaryCurious/Utilities/Constants.swift
    entitlements:
      path: BinaryCuriousShareExtension/BinaryCuriousShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.binarycurious.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.binarycurious.app.share
        MARKETING_VERSION: "0.47.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: BinaryCuriousShareExtension/Info.plist
    info:
      path: BinaryCuriousShareExtension/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Binary Curious
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
